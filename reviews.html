<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы — Photoset AI</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=9">
  <style>
    body {
      background: var(--white);
      color: var(--text);
      overflow-x: hidden;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.3s;
    }

    /* Grainy Texture */
    body::after {
      content: ""; position: fixed; inset: 0;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05; pointer-events: none; z-index: 1000; filter: contrast(120%) brightness(100%);
    }

    /* Background blobs - adaptive */
    .blob {
      position: fixed; width: 60vw; height: 60vw;
      background: radial-gradient(circle, var(--accent2) 0%, transparent 70%);
      z-index: -1; pointer-events: none; filter: blur(100px);
      opacity: 0.1;
    }
    .blob-1 { top: -10%; right: -10%; }
    .blob-2 { bottom: -10%; left: -10%; opacity: 0.05; }

    .reviews-page-header {
      padding: 160px 40px 80px;
      text-align: center;
      max-width: 1120px;
      margin: 0 auto;
    }
    .section-tag {
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 24px; display: inline-block;
      font-weight: 600;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6rem); font-weight: 300; line-height: 0.95;
      margin-bottom: 32px; letter-spacing: -0.02em;
      color: var(--text);
    }
    .section-title em { font-style: italic; opacity: 0.8; }
    .hero-sub {
      font-size: 1.1rem; color: var(--muted); max-width: 600px; margin: 0 auto;
      line-height: 1.6; font-weight: 300;
    }

    /* Masonry Grid */
    .reviews-masonry {
      columns: 4 300px;
      column-gap: 32px;
      padding: 0 40px 120px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .review-card-static {
      break-inside: avoid;
      margin-bottom: 32px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 14px;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0; transform: translateY(40px);
      cursor: zoom-in;
      box-shadow: var(--glass-shadow);
    }
    .review-card-static.visible { opacity: 1; transform: translateY(0); }
    .review-card-static:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: var(--accent2);
      box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    }
    .review-card-static img {
      width: 100%; height: auto; border-radius: 18px;
      display: block; transition: filter 0.4s;
    }

    .back-btn-wrap {
      position: fixed; top: 40px; left: 40px; z-index: 1100;
    }
    .btn-back {
      padding: 14px 28px; border-radius: 100px;
      background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      color: var(--text); font-size: 0.85rem; font-weight: 500;
      text-decoration: none; transition: all 0.4s;
      display: flex; align-items: center; gap: 8px;
      box-shadow: var(--glass-shadow);
    }
    .btn-back:hover { 
      background: var(--accent); color: #fff; 
      border-color: var(--accent);
      transform: translateX(-5px); 
    }

    #loadingReviews {
      text-align: center; padding: 100px; color: var(--muted);
      font-size: 0.9rem; letter-spacing: 0.1em;
    }

    @media (max-width: 900px) {
      .reviews-masonry { columns: 2 250px; padding: 0 24px 80px; }
      .back-btn-wrap { top: 20px; left: 20px; }
    }
    @media (max-width: 600px) {
      .reviews-masonry { columns: 1; }
      .reviews-page-header { padding: 120px 24px 60px; }
    }
  </style>
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="back-btn-wrap">
    <a href="index.html" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        На главную
    </a>
  </div>

  <header class="reviews-page-header">
    <div class="section-tag">Мнение</div>
    <h1 class="section-title">Что говорят <em>клиенты</em></h1>
    <p class="hero-sub" style="margin-top: 20px;">Честные отзывы в виде скриншотов из переписки. Нажмите на любой отзыв,
      чтобы увеличить.</p>
  </header>

  <main>
    <div id="loadingReviews">Загрузка отзывов...</div>
    <div class="reviews-masonry" id="fullReviewsGrid">
      <!-- Будет заполнено из Google Sheets -->
    </div>
  </main>

  <footer>
    &copy; 2026 Photoset AI. Все права защищены.
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox">
    <div class="lightbox-overlay" id="lightboxOverlay"></div>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="Fullscreen Review">
      <button class="lightbox-close" id="lightboxClose">&times;</button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    // Специальная логика для страницы отзывов
    async function loadAllReviews() {
      const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR0J7WbDhRUobmGiPwGJ5sllkRsf-gYh6M0FIuYvXKPwsWuZvTgOVqhDLlTiOi24Qh9klJdIoIa-Cmm/pub?output=csv';
      const grid = document.getElementById('fullReviewsGrid');
      const loading = document.getElementById('loadingReviews');
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightboxImg');
      const lbClose = document.getElementById('lightboxClose');
      const lbOverlay = document.getElementById('lightboxOverlay');

      try {
        const res = await fetch(url);
        const csv = await res.text();
        const rows = csv.split('\n').filter(r => r.trim() !== '');

        loading.style.display = 'none';
        let html = '';
        rows.forEach((url, i) => {
          const imgUrl = url.trim().replace(/^"|"$/g, '');
          if (!imgUrl.startsWith('http')) return;

          const card = document.createElement('div');
          card.className = 'review-card-static';
          card.onclick = () => openLB(imgUrl);
          card.innerHTML = `<img src="${imgUrl}" alt="Отзыв клиента" loading="lazy">`;

          grid.appendChild(card);

          // Staggered reveal
          setTimeout(() => {
            card.classList.add('visible');
          }, i * 100);
        });
      } catch (e) {
        loading.innerText = 'Ошибка загрузки отзывов. Попробуйте позже.';
      }
    }

    function openLB(src) {
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightboxImg');
      lbImg.src = src;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    const closeLb = () => {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    };
    document.getElementById('lightboxClose').onclick = closeLb;
    document.getElementById('lightboxOverlay').onclick = closeLb;

    window.addEventListener('DOMContentLoaded', loadAllReviews);
  </script>
</body>

</html>
