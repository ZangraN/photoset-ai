<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifestyle — PhotosetAI</title>
<meta name="color-scheme" content="light dark">
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white:#FAFAF8; --off-white:#F4F2EE; --text:#1a1a18; --muted:#7a7a75;
    --accent:#FF5C35; --accent2:#6C63FF;
    --glass-bg:rgba(255,255,255,0.55); --glass-border:rgba(255,255,255,0.75);
    --glass-shadow:0 8px 40px rgba(0,0,0,0.08);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:"DM Sans",sans-serif;background:var(--white);color:var(--text);overflow-x:hidden;}
  .blob-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.35;animation:drift 18s ease-in-out infinite alternate;}
  .blob-1{width:520px;height:520px;background:#FFD6CC;top:-120px;left:-100px;}
  .blob-2{width:400px;height:400px;background:#D4CCFF;top:30%;right:-80px;animation-delay:-6s;}
  .blob-3{width:320px;height:320px;background:#C8F5E8;bottom:10%;left:20%;animation-delay:-12s;}
  .blob-4{width:280px;height:280px;background:#FFE8B0;bottom:-60px;right:15%;animation-delay:-4s;}
  @keyframes drift{0%{transform:translate(0,0)scale(1)}100%{transform:translate(40px,30px)scale(1.08)}}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,250,248,0.7);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,0.6);}
  .nav-logo{font-family:"Cormorant Garamond",serif;font-size:1.4rem;font-weight:600;color:var(--text);text-decoration:none;}
  .nav-logo span{color:var(--accent);}
  .nav-back{display:inline-flex;align-items:center;gap:8px;font-size:0.82rem;letter-spacing:0.06em;color:var(--muted);text-decoration:none;transition:color 0.2s;}
  .nav-back:hover{color:var(--accent);}
  .nav-back:hover svg{transform:translateX(-3px);}
  .nav-back svg{transition:transform 0.2s;}
  .cat-header{padding:130px 40px 48px;max-width:1120px;margin:0 auto;position:relative;z-index:1;}
  .cat-breadcrumb{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
  .cat-breadcrumb a{color:var(--muted);text-decoration:none;}
  .cat-breadcrumb a:hover{color:var(--accent);}
  .cat-header-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:16px;}
  .cat-title{font-family:"Cormorant Garamond",serif;font-size:clamp(2.4rem,5vw,4.2rem);font-weight:300;line-height:1.1;letter-spacing:-0.01em;}
  .cat-title em{font-style:italic;color:var(--accent);}
  .gender-toggle{display:flex;align-items:center;background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:100px;padding:4px;position:relative;flex-shrink:0;}
  .gender-tab{padding:9px 22px;border-radius:100px;font-size:0.8rem;font-weight:500;letter-spacing:0.04em;font-family:"DM Sans",sans-serif;cursor:pointer;color:var(--muted);transition:color 0.25s;position:relative;z-index:1;user-select:none;}
  .gender-tab.active{color:#fff;}
  .gender-slider{position:absolute;top:4px;bottom:4px;border-radius:100px;background:linear-gradient(135deg,var(--accent),#FF8C6B);box-shadow:0 3px 12px rgba(255,92,53,0.3);transition:left 0.3s cubic-bezier(0.22,1,0.36,1),width 0.3s cubic-bezier(0.22,1,0.36,1);z-index:0;}
  .cat-desc{font-size:0.95rem;color:var(--muted);line-height:1.7;max-width:480px;}
  .cat-count{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
  .cat-count::before{content:"";display:block;width:24px;height:1px;background:var(--muted);}
  .cat-grid{columns:3;column-gap:14px;padding:0 40px 100px;max-width:1120px;margin:0 auto;position:relative;z-index:1;}
  .photo-item{break-inside:avoid;border-radius:16px;overflow:hidden;position:relative;cursor:pointer;margin-bottom:14px;background:var(--glass-bg);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);transition:transform 0.36s cubic-bezier(0.22,1,0.36,1),box-shadow 0.36s;display:block;}
  .photo-item:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,0.15);}
  .photo-item img{width:100%;height:auto;display:block;transition:transform 0.5s cubic-bezier(0.22,1,0.36,1);}
  .photo-item:hover img{transform:scale(1.03);}
  .photo-item .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.3) 0%,transparent 55%);opacity:0;transition:opacity 0.3s;z-index:1;}
  .photo-item:hover .overlay{opacity:1;}
  .photo-item .zoom{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.7);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;opacity:0;z-index:2;transition:opacity 0.25s,transform 0.25s cubic-bezier(0.22,1,0.36,1);}
  .photo-item:hover .zoom{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .photo-placeholder{width:100%;aspect-ratio:2/3;background:linear-gradient(145deg,#f0ede8,#e2ddd6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
  .photo-placeholder svg{opacity:0.2;}
  .photo-placeholder p{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;opacity:0.4;}
  .lightbox{position:fixed;inset:0;z-index:1000;background:rgba(12,11,10,0.92);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s cubic-bezier(0.22,1,0.36,1);}
  .lightbox.open{opacity:1;pointer-events:all;}
  .lb-inner{position:relative;max-width:min(520px,90vw);width:100%;transform:scale(0.9) translateY(20px);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);}
  .lightbox.open .lb-inner{transform:scale(1) translateY(0);}
  .lb-img{border-radius:20px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.5);max-height:85vh;display:flex;align-items:center;justify-content:center;}
  .lb-img img{width:100%;height:auto;max-height:85vh;object-fit:contain;display:block;}
  .lb-close{position:absolute;top:-16px;right:-16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:10;transition:background 0.2s;}
  .lb-close:hover{background:rgba(255,255,255,0.22);}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background 0.2s;}
  .lb-nav:hover{background:rgba(255,255,255,0.2);}
  .lb-prev{left:-60px;}.lb-next{right:-60px;}
  .lb-dots{display:flex;gap:8px;justify-content:center;margin-top:16px;}
  .lb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:background 0.2s,transform 0.2s;}
  .lb-dot.active{background:#fff;transform:scale(1.3);}
  footer{text-align:center;padding:32px;border-top:1px solid rgba(0,0,0,0.06);font-size:0.78rem;color:var(--muted);letter-spacing:0.06em;position:relative;z-index:1;}
  @media(max-width:900px){.cat-header{padding:110px 20px 40px;}.cat-grid{columns:2;column-gap:10px;padding:0 20px 80px;}nav{padding:16px 20px;}.lb-prev{left:-44px;}.lb-next{right:-44px;}}
  @media(max-width:600px){.cat-header{padding:90px 16px 32px;}.cat-grid{columns:2;column-gap:8px;padding:0 16px 60px;}.cat-header-row{flex-direction:column;align-items:flex-start;gap:16px;}.lb-prev,.lb-next{display:none;}.lb-inner{max-width:94vw;}.gender-tab{padding:8px 16px;font-size:0.75rem;}}
  @media(max-width:420px){.cat-grid{columns:1;}}
  @media(prefers-color-scheme:dark){
    :root{--white:#111110;--off-white:#1a1917;--text:#F0EDE8;--muted:#8a8a84;--accent:#FF6B47;--accent2:#8B84FF;--glass-bg:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);--glass-shadow:0 8px 40px rgba(0,0,0,0.3);}
    .blob-1{background:#5C2A1E;opacity:0.5;}.blob-2{background:#2A2560;opacity:0.5;}.blob-3{background:#0D3D2E;opacity:0.45;}.blob-4{background:#4A3800;opacity:0.45;}
    nav{background:rgba(17,17,16,0.8);border-bottom-color:rgba(255,255,255,0.08);}
    footer{border-top-color:rgba(255,255,255,0.07);}
    .photo-placeholder{background:linear-gradient(145deg,#1e1c1a,#171614);}
  }
</style>
</head>
<body>
<div class="blob-wrap">
  <div class="blob blob-1"></div><div class="blob blob-2"></div>
  <div class="blob blob-3"></div><div class="blob blob-4"></div>
</div>
<nav>
  <a href="index.html" class="nav-logo">Photoset<span>AI</span></a>
  <a href="index.html#portfolio" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Все категории
  </a>
</nav>
<div class="lightbox" id="lightbox" onclick="lbBgClose(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="lbClose()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="lb-nav lb-next" onclick="lbNav(1)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <div class="lb-img" id="lbImg"></div>
    <div class="lb-dots" id="lbDots"></div>
  </div>
</div>
<header class="cat-header">
  <div class="cat-breadcrumb" id="breadcrumb"></div>
  <div class="cat-header-row">
    <h1 class="cat-title"><em>Lifestyle</em></h1>
    <div class="gender-toggle" id="genderToggle">
      <div class="gender-slider" id="genderSlider"></div>
      <div class="gender-tab" data-gender="female" onclick="switchGender('female')">Женские</div>
      <div class="gender-tab" data-gender="male" onclick="switchGender('male')">Мужские</div>
    </div>
  </div>
  <p class="cat-desc" id="catDesc"></p>
  <span class="cat-count" id="photoCount"></span>
</header>
<div class="cat-grid" id="catGrid"></div>
<footer>© 2026 PhotosetAI · Павел &nbsp;·&nbsp; Все права защищены</footer>
<script>
  const DATA = {
    male:   { desc: "\u041c\u0443\u0436\u0441\u043a\u0438\u0435 lifestyle-\u043e\u0431\u0440\u0430\u0437\u044b \u0434\u043b\u044f Instagram \u0438 \u043b\u0438\u0447\u043d\u044b\u0445 \u0441\u0442\u0440\u0430\u043d\u0438\u0446. \u0420\u0430\u0437\u043d\u044b\u0435 \u043b\u043e\u043a\u0430\u0446\u0438\u0438 \u0438 \u0441\u0442\u0438\u043b\u0438 \u0431\u0435\u0437 \u0432\u044b\u0435\u0437\u0434\u0430.",   photos: ["https://i.postimg.cc/xCqNzJJT/photo-2026-03-19-12-44-52.jpg"] },
    female: { desc: "\u0416\u0435\u043d\u0441\u043a\u0438\u0435 lifestyle-\u043e\u0431\u0440\u0430\u0437\u044b \u0434\u043b\u044f Instagram \u0438 \u043b\u0438\u0447\u043d\u044b\u0445 \u0441\u0442\u0440\u0430\u043d\u0438\u0446. \u0420\u0430\u0437\u043d\u044b\u0435 \u043b\u043e\u043a\u0430\u0446\u0438\u0438 \u0438 \u0441\u0442\u0438\u043b\u0438 \u0431\u0435\u0437 \u0432\u044b\u0435\u0437\u0434\u0430.", photos: [] }
  };
  const TITLE = "Lifestyle";
  let currentGender = "female";
  let imgs = [], cur = 0;

  function buildGrid(gender) {
    const data = DATA[gender];
    const grid = document.getElementById('catGrid');
    const PHOTO_COUNT = 3; // увеличьте при добавлении фото
    let html = '';
    for (let i = 0; i < PHOTO_COUNT; i++) {
      if (i < data.photos.length) {
        html += `<div class="photo-item" onclick="lbOpen(${i},event)">
          <img src="${data.photos[i]}" alt="">
          <div class="overlay"></div>
          <div class="zoom"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>
        </div>`;
      } else {
        html += `<div class="photo-item">
          <div class="photo-placeholder">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="4" y="8" width="32" height="24" rx="4" stroke="currentColor" stroke-width="1.5"/><circle cx="20" cy="20" r="5" stroke="currentColor" stroke-width="1.5"/></svg>
            <p>Фото скоро</p>
          </div>
        </div>`;
      }
    }
    grid.innerHTML = html;
    imgs = Array.from(grid.querySelectorAll('.photo-item img')).map(i => i.src);
    document.getElementById('catDesc').textContent = data.desc;
    document.getElementById('photoCount').textContent = data.photos.length + ' фотографий';
    document.getElementById('breadcrumb').innerHTML =
      `<a href="index.html">Главная</a> / Категории / ${gender==='male'?'Мужские':'Женские'} / ${TITLE}`;
    const obs = new IntersectionObserver(entries => entries.forEach(e => {
      if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; obs.unobserve(e.target); }
    }), {threshold:0.05});
    grid.querySelectorAll('.photo-item').forEach((el,i) => {
      el.style.opacity='0'; el.style.transform='translateY(18px)';
      el.style.transition=`opacity 0.5s cubic-bezier(0.22,1,0.36,1) ${i*0.07}s,transform 0.5s cubic-bezier(0.22,1,0.36,1) ${i*0.07}s`;
      obs.observe(el);
    });
  }

  function switchGender(gender) {
    if (gender === currentGender) return;
    currentGender = gender;
    document.querySelectorAll('.gender-tab').forEach(t => t.classList.toggle('active', t.dataset.gender===gender));
    moveSlider(gender);
    const grid = document.getElementById('catGrid');
    grid.style.transition='opacity 0.2s'; grid.style.opacity='0';
    setTimeout(() => { buildGrid(gender); grid.style.opacity='1'; }, 200);
  }

  function moveSlider(gender) {
    const toggle=document.getElementById('genderToggle');
    const tab=document.querySelector(`.gender-tab[data-gender="${gender}"]`);
    const slider=document.getElementById('genderSlider');
    if(!toggle||!tab||!slider) return;
    const tr=toggle.getBoundingClientRect(), br=tab.getBoundingClientRect();
    slider.style.left=(br.left-tr.left)+'px'; slider.style.width=br.width+'px';
  }

  window.addEventListener('load', () => {
    document.querySelector(`.gender-tab[data-gender="${currentGender}"]`).classList.add('active');
    buildGrid(currentGender);
    requestAnimationFrame(() => moveSlider(currentGender));
  });
  window.addEventListener('resize', () => moveSlider(currentGender));

  function lbOpen(idx,e) { if(e)e.stopPropagation(); if(idx>=imgs.length)return; cur=idx; renderLb(); document.getElementById('lightbox').classList.add('open'); document.body.style.overflow='hidden'; }
  function lbClose() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
  function lbBgClose(e) { if(e.target===document.getElementById('lightbox'))lbClose(); }
  function lbNav(dir) {
    const inner=document.querySelector('.lb-inner');
    const out=dir===1?'-60px':'60px', inn=dir===1?'60px':'-60px';
    inner.style.transition='opacity 0.16s,transform 0.16s'; inner.style.opacity='0'; inner.style.transform=`scale(0.95) translateX(${out})`;
    setTimeout(() => {
      cur=(cur+dir+imgs.length)%imgs.length; renderLb();
      inner.style.transition='none'; inner.style.transform=`scale(0.95) translateX(${inn})`; inner.style.opacity='0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        inner.style.transition='opacity 0.2s,transform 0.22s cubic-bezier(0.22,1,0.36,1)';
        inner.style.opacity='1'; inner.style.transform='scale(1) translateX(0)';
      }));
    }, 160);
  }
  function renderLb() {
    document.getElementById('lbImg').innerHTML = imgs[cur]?`<img src="${imgs[cur]}" alt="">`:'<div style="width:100%;height:300px;background:#1e1c1a"></div>';
    const dots=document.getElementById('lbDots'); dots.innerHTML='';
    imgs.forEach((_,i) => { const d=document.createElement('div'); d.className='lb-dot'+(i===cur?' active':''); d.onclick=ev=>{ev.stopPropagation();cur=i;renderLb();}; dots.appendChild(d); });
  }
  document.addEventListener('keydown', e => {
    if(!document.getElementById('lightbox').classList.contains('open'))return;
    if(e.key==='Escape')lbClose(); if(e.key==='ArrowLeft')lbNav(-1); if(e.key==='ArrowRight')lbNav(1);
  });
  (function(){
    const lb=document.getElementById('lightbox'); let sx=0,sy=0,drag=false;
    const inn=()=>document.querySelector('.lb-inner');
    lb.addEventListener('touchstart',e=>{if(!lb.classList.contains('open'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=true;inn().style.transition='none';},{passive:true});
    lb.addEventListener('touchmove',e=>{if(!drag||!lb.classList.contains('open'))return;const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)){const c=Math.max(-120,Math.min(120,dx));inn().style.transform=`translateX(${c}px) scale(${1-Math.abs(c)/120*0.04})`;inn().style.opacity=`${1-Math.abs(c)/120*0.3}`;}},{passive:true});
    lb.addEventListener('touchend',e=>{if(!drag||!lb.classList.contains('open'))return;drag=false;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){lbNav(dx<0?1:-1);}else{inn().style.transition='opacity 0.2s,transform 0.2s';inn().style.transform='translateX(0) scale(1)';inn().style.opacity='1';}},{passive:true});
  })();
</script>
</body>
</html>
