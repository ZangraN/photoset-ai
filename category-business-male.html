<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бизнес-портрет — PhotosetAI</title>
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="blob-wrap">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>
  <nav>
    <a href="index.html" class="nav-logo">Photoset<span>AI</span></a>
    <a href="index.html#portfolio" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      Все категории
    </a>
  </nav>
  <div class="lightbox" id="lightbox" onclick="lbBgClose(event)">
    <div class="lb-inner">
      <button class="lb-close" onclick="lbClose()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg></button>
      <button class="lb-nav lb-prev" onclick="lbNav(-1)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg></button>
      <button class="lb-nav lb-next" onclick="lbNav(1)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg></button>
      <div class="lb-img" id="lbImg"></div>
      <div class="lb-dots" id="lbDots"></div>
    </div>
  </div>
  <main>
    <header class="cat-header">
      <div class="cat-breadcrumb" id="breadcrumb"></div>
      <div class="cat-header-row">
        <h1 class="cat-title">Бизнес-<em>портрет</em></h1>
        <div class="gender-toggle" id="genderToggle">
          <div class="gender-slider" id="genderSlider"></div>
          <button type="button" class="gender-tab" data-gender="female"
            onclick="switchGender('female')">Женские</button>
          <button type="button" class="gender-tab" data-gender="male" onclick="switchGender('male')">Мужские</button>
        </div>
      </div>
      <p class="cat-desc" id="catDesc"></p>
      <span class="cat-count" id="photoCount"></span>
    </header>
    <div class="cat-grid" id="catGrid"></div>
  </main>
  <footer>© 2026 PhotosetAI · Павел &nbsp;·&nbsp; Все права защищены</footer>
  <script>
    const DATA = {
      male: { desc: "\u041f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0435 \u043c\u0443\u0436\u0441\u043a\u0438\u0435 \u043e\u0431\u0440\u0430\u0437\u044b \u0434\u043b\u044f LinkedIn, \u043a\u043e\u0440\u043f\u043e\u0440\u0430\u0442\u0438\u0432\u043d\u044b\u0445 \u0441\u0430\u0439\u0442\u043e\u0432 \u0438 \u0434\u0435\u043b\u043e\u0432\u044b\u0445 \u043f\u0440\u043e\u0444\u0438\u043b\u0435\u0439.", photos: ["https://i.postimg.cc/6QHBXD2c/Woman-listening-in-202603201145.jpg"] },
      female: { desc: "\u041f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0435 \u0436\u0435\u043d\u0441\u043a\u0438\u0435 \u043e\u0431\u0440\u0430\u0437\u044b \u0434\u043b\u044f LinkedIn, \u043a\u043e\u0440\u043f\u043e\u0440\u0430\u0442\u0438\u0432\u043d\u044b\u0445 \u0441\u0430\u0439\u0442\u043e\u0432 \u0438 \u0434\u0435\u043b\u043e\u0432\u044b\u0445 \u043f\u0440\u043e\u0444\u0438\u043b\u0435\u0439.", photos: [] }
    };
    const TITLE = "\u0411\u0438\u0437\u043d\u0435\u0441-\u043f\u043e\u0440\u0442\u0440\u0435\u0442";

    window.TITLE = TITLE;
    window.DATA = DATA;
    window.currentGender = "male";
  </script>
  <script src="assets/js/main.js"></script>
</body>

</html>
